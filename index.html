    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(14,12,10,0.25) 0%,
        rgba(14,12,10,0.15) 40%,
        rgba(14,12,10,0.30) 100%
      );
    }

    /* ── MAIN CONTENT ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── PROFILE PHOTO ── */
    .profile-photo-wrap {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-dark), var(--gold));
      box-shadow: 0 0 40px rgba(201, 168, 76, 0.3), 0 0 80px rgba(201, 168, 76, 0.1);
      animation: fadeDown 0.9s ease both;
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .profile-photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: var(--mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 300;
    }

    .profile-photo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* SWAP THE PLACEHOLDER TEXT FOR YOUR IMAGE:
       <img src="PROFILE PHOTO.jpg" alt="Braiden Sunshine" />
       inside .profile-photo-inner */

    /* ── NAME ── */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      text-align: center;
      animation: fadeDown 0.9s 0.15s ease both;
      margin-bottom: 6px;
    }

    .name-accent {
      display: block;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 14px auto 38px;
      animation: fadeDown 0.9s 0.25s ease both;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-radius: 4px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      color: var(--cream);
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      font-weight: 400;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.25s;
      animation: fadeUp 0.8s ease both;
    }

    .link-card:nth-child(1) { animation-delay: 0.35s; }
    .link-card:nth-child(2) { animation-delay: 0.45s; }
    .link-card:nth-child(3) { animation-delay: 0.55s; }
    .link-card:nth-child(4) { animation-delay: 0.65s; }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(201,168,76,0.07), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-card:hover {
      border-color: rgba(201,168,76,0.55);
      box-shadow: 0 0 24px rgba(201,168,76,0.15), inset 0 0 24px rgba(201,168,76,0.04);
      transform: translateY(-2px);
    }

    .link-card:hover::before { opacity: 1; }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(201,168,76,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    .link-card:hover .link-icon {
      background: rgba(201,168,76,0.18);
      border-color: rgba(201,168,76,0.5);
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--gold);
    }

    .link-label {
      flex: 1;
    }

    .link-label span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--cream);
      text-transform: none;
      line-height: 1.1;
    }

    .link-label small {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: rgba(30,10,0,0.6);
      text-transform: uppercase;
    }

    .link-arrow {
      color: #5a2e00;
      font-size: 0.9rem;
      opacity: 0.6;
      transition: opacity 0.3s, transform 0.3s;
    }

    .link-card:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 60px;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.2);
      text-align: center;
      animation: fadeUp 0.8s 0.8s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subheading {
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5a2e00;
      text-align: center;
      margin-top: 6px;
      margin-bottom: 4px;
      animation: fadeDown 0.9s 0.2s ease both;
    }
  </style>
</head>
